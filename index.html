<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checklists by Bejhan</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--primary:#2563eb}
    @media(prefers-color-scheme:dark){:root{--bg:#111827;--card:#1f2937;--text:#f9fafb;--muted:#9ca3af;--border:#374151}}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0}
    h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:14px;margin-top:4px}
    main{padding:16px;max-width:760px;margin:auto}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
    input,button{font-size:16px;border-radius:12px;padding:12px;box-sizing:border-box}
    input{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text);margin:6px 0 12px}
    button{border:0;background:var(--primary);color:white;font-weight:600}.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .row{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none}.item{padding:12px 0;border-top:1px solid var(--border)}
    .item:first-child{border-top:0}.muted{color:var(--muted)}.pill{display:inline-block;font-size:12px;padding:4px 8px;border-radius:999px;background:var(--bg);border:1px solid var(--border)}
  </style>
</head>
<body>
<header>
  <h1>Checklists by Bejhan</h1>
  <div class="sub" id="subtitle">Login</div>
</header>

<main>
  <section id="config" class="card">
    <h2>Supabase verbinden</h2>
    <p class="muted">Einmalig deine Supabase URL und deinen anon public key eintragen. Wird lokal im Browser gespeichert.</p>
    <label>Supabase URL</label>
    <input id="supabaseUrl" placeholder="https://xxxxx.supabase.co">
    <label>Anon Public Key</label>
    <input id="supabaseKey" placeholder="eyJ...">
    <button onclick="saveConfig()">Speichern</button>
  </section>

  <section id="login" class="card hidden">
    <h2>Anmelden</h2>
    <label>E-Mail</label>
    <input id="email" type="email" autocomplete="email">
    <label>Passwort</label>
    <input id="password" type="password" autocomplete="current-password">
    <div class="row">
      <button onclick="login()">Anmelden</button>
      <button class="ghost" onclick="logout()">Abmelden</button>
    </div>
    <p id="loginMsg" class="muted"></p>
  </section>

  <section id="dashboard" class="hidden">
    <div class="card">
      <h2>Dashboard</h2>
      <p id="profileLine" class="muted"></p>
      <span id="adminBadge" class="pill hidden">👑 Super Admin</span>
    </div>

    <div class="card">
      <h2>📂 Vorlagen</h2>
      <div id="templatesList" class="muted">Lade Vorlagen...</div>
    </div>

    <div class="card">
      <h2>📋 Checklisten</h2>
      <div id="checklistsList" class="muted">Noch keine Checklisten geladen.</div>
    </div>
  </section>
</main>

<script>
let client = null;

function getConfig(){
  return {
    url: localStorage.getItem("supabaseUrl") || "",
    key: localStorage.getItem("supabaseKey") || ""
  };
}

function init(){
  const cfg = getConfig();
  document.getElementById("supabaseUrl").value = cfg.url;
  document.getElementById("supabaseKey").value = cfg.key;
  if(cfg.url && cfg.key){
    client = supabase.createClient(cfg.url, cfg.key);
    document.getElementById("login").classList.remove("hidden");
    checkSession();
  }
}

function saveConfig(){
  localStorage.setItem("supabaseUrl", document.getElementById("supabaseUrl").value.trim());
  localStorage.setItem("supabaseKey", document.getElementById("supabaseKey").value.trim());
  location.reload();
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const { error } = await client.auth.signInWithPassword({ email, password });
  document.getElementById("loginMsg").textContent = error ? error.message : "Angemeldet.";
  if(!error) loadApp();
}

async function logout(){
  if(client) await client.auth.signOut();
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("subtitle").textContent = "Login";
}

async function checkSession(){
  const { data } = await client.auth.getSession();
  if(data.session) loadApp();
}

async function loadApp(){
  document.getElementById("subtitle").textContent = "Dashboard";
  document.getElementById("dashboard").classList.remove("hidden");

  const { data: userData } = await client.auth.getUser();
  const user = userData.user;

  const { data: profile } = await client.from("profiles").select("*").eq("id", user.id).single();
  document.getElementById("profileLine").textContent = profile ? `${profile.display_name} · ${profile.email}` : user.email;

  const { data: memberships } = await client.from("organization_members").select("role").eq("user_id", user.id);
  const isSuperAdmin = (memberships || []).some(m => m.role === "super_admin");
  document.getElementById("adminBadge").classList.toggle("hidden", !isSuperAdmin);

  await loadTemplates();
  await loadChecklists();
}

async function loadTemplates(){
  const box = document.getElementById("templatesList");
  const { data, error } = await client
    .from("templates")
    .select("id,title,description,icon,is_global")
    .order("title");

  if(error){ box.textContent = error.message; return; }
  if(!data || data.length === 0){ box.textContent = "Keine Vorlagen vorhanden."; return; }

  box.innerHTML = "";
  data.forEach(t => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<strong>${t.icon || "📂"} ${t.title}</strong><br><span class="muted">${t.description || ""} ${t.is_global ? "· global" : ""}</span>`;
    box.appendChild(div);
  });
}

async function loadChecklists(){
  const box = document.getElementById("checklistsList");
  const { data, error } = await client
    .from("checklists")
    .select("id,title,description,icon,archived")
    .order("created_at", { ascending:false });

  if(error){ box.textContent = error.message; return; }
  if(!data || data.length === 0){ box.textContent = "Noch keine Checklisten vorhanden."; return; }

  box.innerHTML = "";
  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<strong>${c.icon || "📋"} ${c.title}</strong><br><span class="muted">${c.description || ""}</span>`;
    box.appendChild(div);
  });
}

if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js"); }
init();
</script>
</body>
</html>
