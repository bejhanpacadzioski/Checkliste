<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checklists by Bejhan</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--p:#2563eb;--d:#dc2626;--g:#16a34a}
@media(prefers-color-scheme:dark){:root{--bg:#111827;--card:#1f2937;--text:#f9fafb;--muted:#9ca3af;--border:#374151}}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
header{padding:16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
main{padding:14px;max-width:980px;margin:auto}h1{font-size:23px;margin:0}.sub,.muted{color:var(--muted)}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:13px}
input,button,textarea,select{font-size:16px;border-radius:12px;padding:11px}input,textarea,select{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text);margin:6px 0 11px}textarea{min-height:110px}
button{border:0;background:var(--p);color:white;font-weight:700;margin:3px}.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}.danger{background:var(--d)}.ok{background:var(--g)}
.hidden{display:none}.row{display:flex;gap:7px;flex-wrap:wrap}.item{padding:12px 0;border-top:1px solid var(--border)}.item:first-child{border-top:0}.pill{display:inline-block;font-size:12px;padding:4px 8px;border-radius:999px;background:var(--bg);border:1px solid var(--border);margin-right:4px}
nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}.active{background:var(--p)!important;color:white!important}.cat{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.checkrow{display:flex;align-items:center;gap:10px;padding:9px 0}.checkrow input{width:24px;height:24px;margin:0}.done{text-decoration:line-through;color:var(--muted)}
.small{font-size:13px}.progress{height:9px;background:var(--border);border-radius:99px;overflow:hidden;margin:8px 0}.bar{height:100%;background:var(--g);width:0%}
</style>
</head>
<body>
<header><h1>Checklists by Bejhan</h1><div class="sub" id="subtitle">Final MVP</div></header>
<main>
<section id="config" class="card">
<h2>Supabase verbinden</h2>
<label>Supabase URL</label><input id="url" placeholder="https://xxxxx.supabase.co">
<label>Anon/Public Key</label><input id="key" placeholder="sb_publishable...">
<button id="saveCfg">Speichern</button><p id="cfgMsg" class="muted"></p>
</section>
<section id="login" class="card hidden">
<h2>Anmelden</h2><label>E-Mail</label><input id="email" type="email"><label>Passwort</label><input id="pw" type="password">
<button id="doLogin">Anmelden</button><button id="doLogout" class="ghost">Abmelden</button><p id="msg" class="muted"></p>
</section>
<section id="app" class="hidden">
<div class="card"><h2>Dashboard</h2><p id="profile" class="muted"></p><span id="badge" class="pill hidden">👑 Super Admin</span><span id="acting" class="pill hidden"></span></div>
<nav><button id="bCheck" class="ghost active">📋 Checklisten</button><button id="bTpl" class="ghost">📂 Vorlagen</button><button id="bAdmin" class="ghost hidden">👥 Admin</button></nav>
<div id="vCheck"><div class="card"><h2>📋 Checklisten</h2><button id="refreshCheck" class="ghost">Aktualisieren</button><div id="checkList" class="muted"></div></div><div id="checkDetail" class="card hidden"></div></div>
<div id="vTpl" class="hidden">
<div class="card"><h2>➕ Vorlage erstellen</h2><input id="tplTitle" placeholder="Titel"><input id="tplDesc" placeholder="Beschreibung"><input id="tplIcon" placeholder="Icon, z.B. 🏊"><textarea id="tplText" placeholder="Kategorie&#10;- Eintrag&#10;- Eintrag&#10;&#10;Weitere Kategorie&#10;- Eintrag"></textarea><button id="createTpl">Vorlage speichern</button></div>
<div class="card"><h2>📂 Vorlagen</h2><button id="seedMore" class="ghost">Standardvorlagen ergänzen</button><div id="tplList" class="muted"></div></div><div id="tplDetail" class="card hidden"></div>
</div>
<div id="vAdmin" class="hidden"><div class="card"><h2>👥 Benutzer</h2><p class="muted small">Benutzer zuerst in Supabase Authentication erstellen, danach hier mit UUID hinzufügen.</p><input id="newUserId" placeholder="Auth User UUID"><input id="newUserEmail" placeholder="E-Mail"><input id="newUserName" placeholder="Name"><select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option><option value="super_admin">Super Admin</option></select><button id="addUser">Benutzer hinzufügen</button><button id="stopActing" class="ghost">Nicht mehr als User arbeiten</button><div id="users" class="muted"></div></div></div>
</section>
</main>
<script>
let sb,user,orgId,isSuper=false,actingAs=null,actingName="";
const $=id=>document.getElementById(id), q=t=>document.createElement(t);
function cfg(){return{url:localStorage.getItem("supabaseUrl")||"",key:localStorage.getItem("supabaseKey")||""}}
function owner(){return actingAs||user.id}
function setActing(id,name){actingAs=id;actingName=name;if(id){$("acting").textContent="Arbeitet als: "+name;$("acting").classList.remove("hidden")}else{$("acting").classList.add("hidden")}loadChecklists();loadTemplates();}
function makeClient(){let c=cfg();$("url").value=c.url;$("key").value=c.key;if(!c.url||!c.key)return false;if(!window.supabase){$("cfgMsg").textContent="Supabase-Bibliothek nicht geladen.";return false}sb=window.supabase.createClient(c.url,c.key);$("login").classList.remove("hidden");return true}
function show(v){["Check","Tpl","Admin"].forEach(x=>{$("v"+x).classList.toggle("hidden",x!==v);$("b"+x).classList.toggle("active",x===v)});if(v==="Admin")loadUsers()}
function btn(t,fn,cls){let b=q("button");b.textContent=t;if(cls)b.className=cls;b.onclick=fn;return b}
$("saveCfg").onclick=()=>{let u=$("url").value.trim().replace(/\/rest\/v1\/?$/,"").replace(/\/$/,""),k=$("key").value.trim();localStorage.setItem("supabaseUrl",u);localStorage.setItem("supabaseKey",k);$("cfgMsg").textContent="Gespeichert.";makeClient();session()}
$("doLogin").onclick=async()=>{let{error}=await sb.auth.signInWithPassword({email:$("email").value.trim(),password:$("pw").value});$("msg").textContent=error?error.message:"Angemeldet";if(!error)load()}
$("doLogout").onclick=async()=>{await sb.auth.signOut();$("app").classList.add("hidden")}
$("bCheck").onclick=()=>show("Check");$("bTpl").onclick=()=>show("Tpl");$("bAdmin").onclick=()=>show("Admin");$("refreshCheck").onclick=loadChecklists;$("createTpl").onclick=createTemplate;$("addUser").onclick=addUser;$("seedMore").onclick=seedStandardTemplates;$("stopActing").onclick=()=>setActing(null,"");
async function session(){if(!sb)return;let{data}=await sb.auth.getSession();if(data.session)load()}
async function load(){
 $("subtitle").textContent="Dashboard";$("app").classList.remove("hidden");
 let u=await sb.auth.getUser();user=u.data.user;
 let p=await sb.from("profiles").select("*").eq("id",user.id).single();$("profile").textContent=(p.data?p.data.display_name:user.email)+" · "+user.email;
 let m=await sb.from("organization_members").select("organization_id,role").eq("user_id",user.id);orgId=m.data?.[0]?.organization_id;isSuper=(m.data||[]).some(x=>x.role==="super_admin");$("badge").classList.toggle("hidden",!isSuper);$("bAdmin").classList.toggle("hidden",!isSuper);
 await loadTemplates();await loadChecklists();
}
function parse(txt){let cats=[],cur=null;txt.split(/\r?\n/).map(x=>x.trim()).forEach(l=>{if(!l)return;if(l.startsWith("-")){if(cur)cur.items.push(l.replace(/^-\s*/,""))}else{cur={title:l,items:[]};cats.push(cur)}});return cats}
async function createTemplateFromData(title,desc,icon,text,isGlobal=true){
 let {data:t,error}=await sb.from("templates").insert({organization_id:orgId,owner_id:owner(),created_by:user.id,updated_by:user.id,title,description:desc,icon:icon||"📂",is_global:isGlobal&&isSuper}).select().single(); if(error){alert(error.message);return null}
 let n=10;for(const c of parse(text)){let r=await sb.from("template_categories").insert({template_id:t.id,title:c.title,sort_order:n}).select().single(); if(r.error){alert(r.error.message);return null}let i=10;for(const it of c.items){let e=await sb.from("template_items").insert({category_id:r.data.id,title:it,sort_order:i}); if(e.error){alert(e.error.message);return null}i+=10}n+=10}
 return t;
}
async function createTemplate(){let title=$("tplTitle").value.trim(); if(!title)return alert("Titel fehlt"); await createTemplateFromData(title,$("tplDesc").value.trim(),$("tplIcon").value.trim(),$("tplText").value,isSuper);$("tplTitle").value=$("tplDesc").value=$("tplIcon").value=$("tplText").value="";await loadTemplates();alert("Vorlage erstellt")}
async function loadTemplates(){
 let box=$("tplList");let{data,error}=await sb.from("templates").select("*").is("deleted_at",null).order("title"); if(error){box.textContent=error.message;return}
 box.innerHTML=data?.length?"":"Keine Vorlagen.";
 (data||[]).forEach(t=>{let d=q("div");d.className="item";d.innerHTML=`<b>${t.icon||"📂"} ${t.title}</b><br><span class=muted>${t.description||""}</span><br>`;d.append(btn("Checkliste erstellen",()=>makeChecklist(t)),btn("Öffnen",()=>openTemplate(t.id),"ghost"));box.appendChild(d)})
}
async function openTemplate(id){
 let box=$("tplDetail");box.classList.remove("hidden");box.innerHTML="Lade...";
 let t=await sb.from("templates").select("*").eq("id",id).single();box.innerHTML=`<h2>${t.data.icon||"📂"} ${t.data.title}</h2><p class=muted>${t.data.description||""}</p>`;
 let cats=await sb.from("template_categories").select("*").eq("template_id",id).order("sort_order");
 for(const c of cats.data||[]){let w=q("div");w.className="cat";w.innerHTML=`<h3>${c.title}</h3>`;let items=await sb.from("template_items").select("*").eq("category_id",c.id).order("sort_order");(items.data||[]).forEach(i=>{let p=q("p");p.textContent="• "+i.title;w.appendChild(p)});box.appendChild(w)}
}
async function makeChecklist(t){
 let title=prompt("Titel der Checkliste:",t.title+" "+new Date().toLocaleDateString("de-CH")); if(!title)return;
 let r=await sb.from("checklists").insert({organization_id:orgId,owner_id:owner(),created_by:user.id,updated_by:user.id,template_id:t.id,title,description:t.description,icon:t.icon}).select().single(); if(r.error)return alert(r.error.message);
 let cats=await sb.from("template_categories").select("*").eq("template_id",t.id).order("sort_order");
 for(const c of cats.data||[]){let nc=await sb.from("checklist_categories").insert({checklist_id:r.data.id,title:c.title,sort_order:c.sort_order}).select().single();if(nc.error)return alert(nc.error.message);let items=await sb.from("template_items").select("*").eq("category_id",c.id).order("sort_order");if(items.data?.length){let rows=items.data.map(i=>({category_id:nc.data.id,title:i.title,sort_order:i.sort_order,is_checked:false}));let e=await sb.from("checklist_items").insert(rows);if(e.error)return alert(e.error.message)}}
 await loadChecklists();show("Check");openChecklist(r.data.id);
}
async function loadChecklists(){
 let box=$("checkList");let{data,error}=await sb.from("checklists").select("*").is("deleted_at",null).order("created_at",{ascending:false}); if(error){box.textContent=error.message;return}
 box.innerHTML=data?.length?"":"Noch keine Checklisten.";
 (data||[]).forEach(c=>{let d=q("div");d.className="item";d.innerHTML=`<b>${c.icon||"📋"} ${c.title}</b><br><span class=muted>${c.description||""}</span><br>`;d.append(btn("Öffnen",()=>openChecklist(c.id)),btn("Duplizieren",()=>duplicateChecklist(c.id),"ghost"),btn("Archivieren",()=>archiveChecklist(c.id),"ghost"));box.appendChild(d)})
}
async function openChecklist(id){
 let box=$("checkDetail");box.classList.remove("hidden");box.innerHTML="Lade...";
 let c=await sb.from("checklists").select("*").eq("id",id).single();box.innerHTML=`<h2>${c.data.icon||"📋"} ${c.data.title}</h2><p class=muted>${c.data.description||""}</p>`;
 let add=btn("Eintrag hinzufügen",()=>addChecklistItem(id),"ghost");box.appendChild(add);
 let cats=await sb.from("checklist_categories").select("*").eq("checklist_id",id).order("sort_order");
 let total=0,done=0,content=q("div");
 for(const cat of cats.data||[]){let w=q("div");w.className="cat";w.innerHTML=`<h3>${cat.title}</h3>`;let items=await sb.from("checklist_items").select("*").eq("category_id",cat.id).order("sort_order");(items.data||[]).forEach(it=>{total++;if(it.is_checked)done++;let row=q("label");row.className="checkrow";let cb=q("input");cb.type="checkbox";cb.checked=it.is_checked;let sp=q("span");sp.textContent=it.title;if(it.is_checked)sp.className="done";cb.onchange=async()=>{sp.className=cb.checked?"done":"";await sb.from("checklist_items").update({is_checked:cb.checked,checked_at:cb.checked?new Date().toISOString():null,checked_by:cb.checked?user.id:null}).eq("id",it.id);openChecklist(id)};row.append(cb,sp);w.appendChild(row)});content.appendChild(w)}
 let pct=total?Math.round(done/total*100):0;let prog=q("div");prog.innerHTML=`<div class=progress><div class=bar style="width:${pct}%"></div></div><p class="muted small">${done}/${total} erledigt (${pct}%)</p>`;box.insertBefore(prog,add.nextSibling);box.appendChild(content)
}
async function addChecklistItem(checklistId){let catName=prompt("Kategorie:","Sonstiges");let title=prompt("Eintrag:"); if(!catName||!title)return;let cats=await sb.from("checklist_categories").select("*").eq("checklist_id",checklistId).eq("title",catName).limit(1);let cat=cats.data?.[0];if(!cat){let c=await sb.from("checklist_categories").insert({checklist_id:checklistId,title:catName,sort_order:999}).select().single();if(c.error)return alert(c.error.message);cat=c.data}let e=await sb.from("checklist_items").insert({category_id:cat.id,title,sort_order:999});if(e.error)return alert(e.error.message);openChecklist(checklistId)}
async function archiveChecklist(id){if(!confirm("Archivieren?"))return;let e=await sb.from("checklists").update({archived:true,deleted_at:new Date().toISOString(),deleted_by:user.id}).eq("id",id);if(e.error)return alert(e.error.message);loadChecklists();$("checkDetail").classList.add("hidden")}
async function duplicateChecklist(id){let c=await sb.from("checklists").select("*").eq("id",id).single();let title=prompt("Name der Kopie:",c.data.title+" Kopie");if(!title)return;let r=await sb.from("checklists").insert({organization_id:orgId,owner_id:owner(),created_by:user.id,updated_by:user.id,title,description:c.data.description,icon:c.data.icon}).select().single();if(r.error)return alert(r.error.message);let cats=await sb.from("checklist_categories").select("*").eq("checklist_id",id).order("sort_order");for(const cat of cats.data||[]){let nc=await sb.from("checklist_categories").insert({checklist_id:r.data.id,title:cat.title,sort_order:cat.sort_order}).select().single();let items=await sb.from("checklist_items").select("*").eq("category_id",cat.id).order("sort_order");if(items.data?.length){await sb.from("checklist_items").insert(items.data.map(i=>({category_id:nc.data.id,title:i.title,sort_order:i.sort_order,is_checked:false})))}}await loadChecklists()}
async function loadUsers(){let box=$("users");let{data,error}=await sb.from("profiles").select("*").order("display_name");if(error){box.textContent=error.message;return}box.innerHTML="";(data||[]).forEach(u=>{let d=q("div");d.className="item";d.innerHTML=`<b>${u.display_name}</b><br><span class=muted>${u.email}</span><br>`;d.append(btn("Als User arbeiten",()=>{setActing(u.id,u.display_name);show("Check")},"ghost"));box.appendChild(d)})}
async function addUser(){let id=$("newUserId").value.trim(),email=$("newUserEmail").value.trim(),name=$("newUserName").value.trim(),role=$("newUserRole").value;if(!id||!email||!name)return alert("UUID, E-Mail und Name nötig");let p=await sb.from("profiles").upsert({id,email,display_name:name});if(p.error)return alert(p.error.message);let m=await sb.from("organization_members").insert({organization_id:orgId,user_id:id,role});if(m.error)return alert(m.error.message);loadUsers()}
async function seedStandardTemplates(){const templates=[["Camping","Packliste fürs Camping","🏕️","Schlafen\n- Zelt\n- Schlafsack\n- Isomatte\n\nKochen\n- Gaskocher\n- Geschirr\n- Besteck\n- Wasser"],["Wandern","Vorlage für Wanderausflüge","🎒","Ausrüstung\n- Wanderschuhe\n- Rucksack\n- Regenjacke\n\nVerpflegung\n- Wasser\n- Snacks\n- Sandwich"],["Flugreise","Vorlage für Reisen mit Flug","✈️","Dokumente\n- Pass/ID\n- Boardingpass\n- Versicherung\n\nHandgepäck\n- Kopfhörer\n- Ladegerät\n- Powerbank"],["Einkauf","Allgemeine Einkaufsliste","🛒","Lebensmittel\n- Brot\n- Milch\n- Früchte\n\nHaushalt\n- Küchenpapier\n- Müllsäcke"]];for(const t of templates) await createTemplateFromData(t[0],t[1],t[2],t[3],true);await loadTemplates();alert("Standardvorlagen ergänzt")}
document.addEventListener("DOMContentLoaded",()=>{makeClient();session()});
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
</script>
</body></html>
