<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checklists by Bejhan</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--primary:#2563eb;--danger:#dc2626}
    @media(prefers-color-scheme:dark){:root{--bg:#111827;--card:#1f2937;--text:#f9fafb;--muted:#9ca3af;--border:#374151}}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:14px;margin-top:4px}
    main{padding:16px;max-width:820px;margin:auto}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
    input,button,select{font-size:16px;border-radius:12px;padding:12px;box-sizing:border-box}
    input,select{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text);margin:6px 0 12px}
    button{border:0;background:var(--primary);color:white;font-weight:600}.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}.danger{background:var(--danger)}
    .row{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none}.item{padding:12px 0;border-top:1px solid var(--border)}
    .item:first-child{border-top:0}.muted{color:var(--muted)}.pill{display:inline-block;font-size:12px;padding:4px 8px;border-radius:999px;background:var(--bg);border:1px solid var(--border)}
    .cat{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}.checkrow{display:flex;align-items:center;gap:10px;padding:8px 0}.checkrow input{width:24px;height:24px;margin:0}.done{text-decoration:line-through;color:var(--muted)}
  </style>
</head>
<body>
<header>
  <h1>Checklists by Bejhan</h1>
  <div class="sub" id="subtitle">Login</div>
</header>

<main>
  <section id="config" class="card">
    <h2>Supabase verbinden</h2>
    <label>Supabase URL</label>
    <input id="supabaseUrl" placeholder="https://xxxxx.supabase.co">
    <label>Anon/Public Key</label>
    <input id="supabaseKey" placeholder="sb_publishable... oder eyJ...">
    <button onclick="saveConfig()">Speichern</button>
  </section>

  <section id="login" class="card hidden">
    <h2>Anmelden</h2>
    <label>E-Mail</label><input id="email" type="email" autocomplete="email">
    <label>Passwort</label><input id="password" type="password" autocomplete="current-password">
    <div class="row"><button onclick="login()">Anmelden</button><button class="ghost" onclick="logout()">Abmelden</button></div>
    <p id="loginMsg" class="muted"></p>
  </section>

  <section id="dashboard" class="hidden">
    <div class="card">
      <h2>Dashboard</h2>
      <p id="profileLine" class="muted"></p>
      <span id="adminBadge" class="pill hidden">👑 Super Admin</span>
    </div>

    <div class="card">
      <h2>📂 Vorlagen</h2>
      <div id="templatesList" class="muted">Lade Vorlagen...</div>
    </div>

    <div class="card">
      <h2>📋 Checklisten</h2>
      <div id="checklistsList" class="muted">Lade Checklisten...</div>
    </div>

    <div id="checklistDetail" class="card hidden"></div>
  </section>
</main>

<script>
let client=null, currentUser=null, currentProfile=null, currentOrgId=null;

function getConfig(){return {url:localStorage.getItem("supabaseUrl")||"",key:localStorage.getItem("supabaseKey")||""};}
function init(){
  const cfg=getConfig();
  supabaseUrl.value=cfg.url; supabaseKey.value=cfg.key;
  if(cfg.url&&cfg.key){client=supabase.createClient(cfg.url,cfg.key);login.classList.remove("hidden");checkSession();}
}
function saveConfig(){localStorage.setItem("supabaseUrl",supabaseUrl.value.trim());localStorage.setItem("supabaseKey",supabaseKey.value.trim());location.reload();}
async function login(){
  const {error}=await client.auth.signInWithPassword({email:email.value.trim(),password:password.value});
  loginMsg.textContent=error?error.message:"Angemeldet.";
  if(!error) loadApp();
}
async function logout(){if(client)await client.auth.signOut();dashboard.classList.add("hidden");subtitle.textContent="Login";}
async function checkSession(){const {data}=await client.auth.getSession();if(data.session)loadApp();}

async function loadApp(){
  subtitle.textContent="Dashboard"; dashboard.classList.remove("hidden");
  const {data:userData}=await client.auth.getUser(); currentUser=userData.user;
  const {data:profile}=await client.from("profiles").select("*").eq("id",currentUser.id).single(); currentProfile=profile;
  profileLine.textContent=profile?`${profile.display_name} · ${profile.email}`:currentUser.email;
  const {data:memberships}=await client.from("organization_members").select("organization_id,role").eq("user_id",currentUser.id);
  currentOrgId=memberships?.[0]?.organization_id || null;
  adminBadge.classList.toggle("hidden", !(memberships||[]).some(m=>m.role==="super_admin"));
  await loadTemplates(); await loadChecklists();
}

async function loadTemplates(){
  const box=templatesList;
  const {data,error}=await client.from("templates").select("id,title,description,icon,is_global").order("title");
  if(error){box.textContent=error.message;return;}
  if(!data?.length){box.textContent="Keine Vorlagen vorhanden.";return;}
  box.innerHTML="";
  data.forEach(t=>{
    const div=document.createElement("div");div.className="item";
    div.innerHTML=`<strong>${t.icon||"📂"} ${t.title}</strong><br><span class="muted">${t.description||""} ${t.is_global?"· global":""}</span><br>`;
    const btn=document.createElement("button");btn.textContent="Checkliste erstellen";btn.style.marginTop="8px";
    btn.onclick=()=>createChecklistFromTemplate(t);
    div.appendChild(btn); box.appendChild(div);
  });
}

async function createChecklistFromTemplate(t){
  const title=prompt("Titel der neuen Checkliste:", t.title + " " + new Date().toLocaleDateString("de-CH"));
  if(!title)return;
  const {data:checklist,error}=await client.from("checklists").insert({
    organization_id:currentOrgId, owner_id:currentUser.id, created_by:currentUser.id, updated_by:currentUser.id,
    template_id:t.id, title, icon:t.icon, description:t.description
  }).select().single();
  if(error){alert(error.message);return;}

  const {data:cats,error:catErr}=await client.from("template_categories").select("id,title,sort_order").eq("template_id",t.id).order("sort_order");
  if(catErr){alert(catErr.message);return;}

  for(const cat of cats||[]){
    const {data:newCat,error:newCatErr}=await client.from("checklist_categories").insert({
      checklist_id:checklist.id,title:cat.title,sort_order:cat.sort_order
    }).select().single();
    if(newCatErr){alert(newCatErr.message);return;}

    const {data:items,error:itemErr}=await client.from("template_items").select("title,sort_order").eq("category_id",cat.id).order("sort_order");
    if(itemErr){alert(itemErr.message);return;}
    if(items?.length){
      const rows=items.map(i=>({category_id:newCat.id,title:i.title,sort_order:i.sort_order,is_checked:false}));
      const {error:insertItemsErr}=await client.from("checklist_items").insert(rows);
      if(insertItemsErr){alert(insertItemsErr.message);return;}
    }
  }
  await client.from("activity_log").insert({organization_id:currentOrgId,user_id:currentUser.id,action:"checklist_created_from_template",entity_type:"checklist",entity_id:checklist.id,payload:{template_id:t.id,title}});
  await loadChecklists();
  await openChecklist(checklist.id);
}

async function loadChecklists(){
  const box=checklistsList;
  const {data,error}=await client.from("checklists").select("id,title,description,icon,archived,created_at").order("created_at",{ascending:false});
  if(error){box.textContent=error.message;return;}
  if(!data?.length){box.textContent="Noch keine Checklisten vorhanden.";return;}
  box.innerHTML="";
  data.forEach(c=>{
    const div=document.createElement("div");div.className="item";
    div.innerHTML=`<strong>${c.icon||"📋"} ${c.title}</strong><br><span class="muted">${c.description||""}</span><br>`;
    const btn=document.createElement("button");btn.textContent="Öffnen";btn.style.marginTop="8px";btn.onclick=()=>openChecklist(c.id);
    div.appendChild(btn);box.appendChild(div);
  });
}

async function openChecklist(id){
  const detail=checklistDetail; detail.classList.remove("hidden"); detail.innerHTML="Lade...";
  const {data:checklist,error}=await client.from("checklists").select("*").eq("id",id).single();
  if(error){detail.textContent=error.message;return;}
  detail.innerHTML=`<h2>${checklist.icon||"📋"} ${checklist.title}</h2><p class="muted">${checklist.description||""}</p>`;
  const {data:cats}=await client.from("checklist_categories").select("id,title,sort_order").eq("checklist_id",id).order("sort_order");
  for(const cat of cats||[]){
    const wrap=document.createElement("div");wrap.className="cat";wrap.innerHTML=`<h3>${cat.title}</h3>`;
    const {data:items}=await client.from("checklist_items").select("*").eq("category_id",cat.id).order("sort_order");
    for(const item of items||[]){
      const row=document.createElement("label");row.className="checkrow";
      const cb=document.createElement("input");cb.type="checkbox";cb.checked=item.is_checked;
      const sp=document.createElement("span");sp.textContent=item.title;if(item.is_checked)sp.className="done";
      cb.onchange=async()=>{
        sp.className=cb.checked?"done":"";
        await client.from("checklist_items").update({is_checked:cb.checked,checked_at:cb.checked?new Date().toISOString():null,checked_by:cb.checked?currentUser.id:null}).eq("id",item.id);
      };
      row.append(cb,sp);wrap.appendChild(row);
    }
    detail.appendChild(wrap);
  }
}

if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}
init();
</script>
</body>
</html>
